<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hiraeth</title>
    <style>
      *,
      *::before,
      *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0d0b0a;
        font-family: 'DM Sans', 'Inter', system-ui, sans-serif;
      }

      #render-canvas {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        touch-action: none; /* let Babylon handle all pointer events */
      }

      #ui-root {
        position: fixed;
        inset: 0;
        pointer-events: none; /* pass-through to canvas by default */
        z-index: 10;
      }

      /* Svelte UI children opt-in to pointer events where needed */
      #ui-root :global([data-interactive]) {
        pointer-events: auto;
      }
    </style>
  </head>
  <body>
    <canvas id="render-canvas"></canvas>
    <div id="ui-root"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
